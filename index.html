<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Imprima&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="landing-styles.css" />
    <link rel="stylesheet" href="main-styles.css" />
    <link rel="icon" type="image/png" href="assets/PortfolioV1Favicon.png" />
    <link rel="stylesheet" href="mobile-styles.css" />
    <title>Kushagra Katiyar</title>
  </head>

  <body>
    <a class="skip-link" href="#main-content" title="Open link"
      >Skip to main content</a
    >
    <main id="main-content">
      <section class="first-fold">
        <div class="hero">
          <div class="image_container">
            <img
              class="profile_image"
              src="assets/profile_picture_landing.jpg"
              alt="Portrait of Kushagra Katiyar"
            />
          </div>

          <div class="hero_text_container">
            <h1 class="hero_text">Kushagra Katiyar</h1>
            <div class="specialty">
              <img class="laptop_icon" src="assets/laptop.svg" alt="" />
              <p class="specialty_text">
                CS @ University of Florida | Full-Stack Developer
              </p>
            </div>

            <div class="location">
              <img
                class="location_icon"
                src="assets/location_icon.svg"
                alt=""
              />
              <p class="location_text">Lake Mary, Florida</p>
            </div>
          </div>
        </div>

        <div class="socials">
          <a
            href="https://github.com/KushagraKatiyar06"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Kushagra Katiyar GitHub profile"
            title="Open GitHub profile"
          >
            <img class="github" src="assets/github_icon.svg" alt="" />
          </a>
          <a
            href="https://www.linkedin.com/in/kushagrakatiyar/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Kushagra Katiyar LinkedIn profile"
            title="Open LinkedIn profile"
          >
            <img class="linkedin" src="assets/linkedin_icon.svg" alt="" />
          </a>
          <a
            href="https://www.instagram.com/just_kushagra/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Kushagra Katiyar Instagram profile"
            title="Open Instagram profile"
          >
            <img class="instagram" src="assets/instagram_icon.svg" alt="" />
          </a>
          <a
            href="https://www.tiktok.com/@just_kushagra"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Kushagra Katiyar TikTok profile"
            title="Open TikTok profile"
          >
            <img class="tiktok" src="assets/tiktok_icon.svg" alt="" />
          </a>
        </div>

        <div
          class="continue_prompt_container"
          role="button"
          tabindex="0"
          aria-label="Scroll to experience section"
        >
          <img class="continue" src="assets/continue_icon.svg" alt="" />
        </div>
      </section>

      <section class="second-fold">
        <nav class="navbar">
          <div
            class="nav_logo_container"
            id="back_to_top"
            role="button"
            tabindex="0"
            aria-label="Back to top"
          >
            <img
              class="navbar_image"
              src="assets/navbar_profile_photo.JPG"
              alt="Kushagra Katiyar profile photo"
            />
          </div>

          <ul class="nav_links">
            <li>
              <button
                class="nav_item active"
                data-target="about"
                aria-controls="about"
                aria-current="page"
                type="button"
              >
                About
              </button>
            </li>
            <li>
              <button
                class="nav_item"
                data-target="experience"
                aria-controls="experience"
                type="button"
              >
                Experience
              </button>
            </li>
            <li>
              <button
                class="nav_item"
                data-target="projects"
                aria-controls="projects"
                type="button"
              >
                Projects
              </button>
            </li>
          </ul>
        </nav>

        <div class="display_window">
          <div id="about" class="content_screen active">
            <div class="bio_container">
              <h2 class="bio_heading">Hey! I'm Kushagra...</h2>
              <p class="bio"></p>
            </div>

            <img class="line1" src="assets/Line1.svg" alt="" />

            <div class="technical_container">
              <div class="skills_container">
                <!-- rendered by scripts.js from portfolioData.skills -->
              </div>
            </div>
          </div>

          <div id="experience" class="content_screen">
            <div class="timeline_container">
              <div class="experience_header_row">
                <div class="sub_tab_bar" id="exp_tab_bar">
                  <button class="sub_tab_btn" data-exp-tab="experience">
                    Professional Experience
                    <span class="sub_tab_indicator"></span>
                  </button>
                  <button class="sub_tab_btn" data-exp-tab="extracurricular">
                    Extracurriculars
                    <span class="sub_tab_indicator"></span>
                  </button>
                  <button class="sub_tab_btn" data-exp-tab="leadership">
                    Leadership
                    <span class="sub_tab_indicator"></span>
                  </button>
                </div>
                <div class="resume_download">
                  <a
                    href="assets/Kushagra_Katiyar_Software_Engineering_Resume.pdf"
                    download
                    class="download_button"
                    title="Download resume"
                  >
                    <img class="download_logo" src="assets/resume.svg" alt="" />
                    <span class="download_text">View Resume</span>
                  </a>
                </div>
              </div>
              <!-- rendered by scripts.js from portfolioData.experiences -->
              <div id="exp_content" class="experience_container"></div>
            </div>
          </div>

          <div id="projects" class="content_screen">
            <div class="proj_wrapper">
              <div class="proj_header_row">
                <div class="sub_tab_bar" id="proj_tab_bar">
                  <button class="sub_tab_btn" data-proj-tab="live">
                    Live
                    <span class="sub_tab_indicator"></span>
                  </button>
                  <button class="sub_tab_btn" data-proj-tab="technical">
                    Technical
                    <span class="sub_tab_indicator"></span>
                  </button>
                  <button class="sub_tab_btn" data-proj-tab="design">
                    Design
                    <span class="sub_tab_indicator"></span>
                  </button>
                </div>
              </div>
              <!-- rendered by scripts.js from portfolioData.projects -->
              <div id="proj_content" class="live_projects"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="portfolio.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
